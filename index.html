<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FIFA World Cup 2026 — Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   ⚙️  CONFIG — GANTI DI SINI
   ══════════════════════════════════════════ */
/* Lihat instruksi di bawah file untuk cara isi API KEY */

:root{
  --bg:#070d1c;--surface:#0e1628;--card:#141e33;--border:#1e2d4a;
  --accent:#f5c518;--accent2:#3a7bd5;--green:#22c55e;--red:#ef4444;
  --orange:#f97316;--gray:#94a3b8;--text:#e2e8f0;--dim:#4a5f7a;
  --live:#ef4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}

/* ── SETUP BANNER ── */
#setup-banner{background:linear-gradient(90deg,#1a3a00,#0e2800);border:1px solid #4a8c00;border-radius:10px;padding:14px 16px;margin:12px;display:none;align-items:flex-start;gap:12px;}
#setup-banner.show{display:flex;}
#setup-banner .icon{font-size:22px;flex-shrink:0;margin-top:2px;}
#setup-banner h3{font-size:13px;font-weight:700;color:#86efac;margin-bottom:4px;}
#setup-banner p{font-size:11px;color:#a7f3d0;line-height:1.6;}
#setup-banner a{color:var(--accent);text-decoration:underline;}
#setup-banner code{background:rgba(0,0,0,.4);border-radius:3px;padding:1px 5px;font-size:10px;color:#fde68a;}

/* ── HEADER ── */
header{background:linear-gradient(180deg,#0a1530 0%,#070d1c 100%);border-bottom:1px solid var(--border);padding:0 14px;position:sticky;top:0;z-index:300;}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;height:52px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--accent);white-space:nowrap;flex-shrink:0;}
.logo span{color:var(--text);}

/* ── STATUS BAR ── */
.status-bar{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .3s;}
.sync-dot.live{background:var(--live);animation:pulse 1.5s infinite;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-label{font-size:10px;color:var(--dim);white-space:nowrap;}
.progress-badge{font-size:10px;font-weight:700;color:#fff;background:var(--dim);border-radius:4px;padding:2px 7px;letter-spacing:.5px;}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;background:none;border:none;color:var(--dim);font-family:'Inter',sans-serif;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.3px;text-transform:uppercase;transition:color .15s;}
.bn-btn .icon{font-size:18px;line-height:1;}
.bn-btn.active{color:var(--accent);}
.bn-btn.active .icon{filter:drop-shadow(0 0 4px rgba(245,197,24,.6));}

main{max-width:1400px;margin:0 auto;padding:14px 12px 80px;}
.tab-panel{display:none;} .tab-panel.active{display:block;}

/* ── SECTION TITLE ── */
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ══════════════════════════════════════════
   OVERVIEW
   ══════════════════════════════════════════ */
.hero{background:linear-gradient(135deg,#091540,#0e1f5c 60%,#071030);border:1px solid #1e3080;border-radius:14px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden;}
.hero::before{content:'⚽';position:absolute;right:-10px;top:-10px;font-size:100px;opacity:.06;transform:rotate(20deg);}
.hero-sub{color:#93c5fd;font-size:10px;margin-bottom:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:.95;letter-spacing:2px;color:#fff;}
.hero-title em{color:var(--accent);font-style:normal;}
.hero-date{color:#64748b;font-size:11px;margin-top:8px;font-weight:500;}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
.stat-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:10px;text-align:center;}
.stat-box .num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1;}
.stat-box .lbl{color:#6b8ab0;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-top:2px;}

/* live matches widget */
.live-widget{background:var(--card);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:14px;margin-bottom:16px;}
.live-widget-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--live);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.live-widget-title .dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite;}
.live-match-card{background:var(--surface);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.live-match-card:last-child{margin-bottom:0;}
.lmc-team{font-weight:600;font-size:12px;flex:1;}
.lmc-team.h{text-align:right;}
.lmc-team.a{text-align:left;}
.lmc-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);min-width:60px;text-align:center;letter-spacing:2px;}
.lmc-min{font-size:9px;color:var(--live);font-weight:700;text-align:center;min-width:36px;}

.rank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px;}
.rank-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:9px;}
.rank-n{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--dim);width:22px;text-align:center;flex-shrink:0;}
.rank-n.t3{color:var(--accent);}
.rank-info{flex:1;min-width:0;}
.rank-team{font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-pts{font-size:9px;color:var(--dim);margin-top:1px;}
.rank-bar-w{height:2px;background:var(--border);border-radius:99px;margin-top:3px;}
.rank-bar{height:2px;background:var(--accent2);border-radius:99px;}

/* ══════════════════════════════════════════
   GROUPS
   ══════════════════════════════════════════ */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.gc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.gc-head{background:var(--surface);padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.gc-letter{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);line-height:1;}
.gc-name{font-weight:600;font-size:12px;}
.gc-played{margin-left:auto;font-size:9px;color:var(--dim);background:var(--border);border-radius:3px;padding:2px 5px;}
.gt{width:100%;border-collapse:collapse;}
.gt th{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);padding:4px 7px;text-align:center;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);}
.gt th:first-child{text-align:left;}
.gt td{padding:6px 7px;text-align:center;border-bottom:1px solid rgba(30,45,74,.5);font-size:11px;}
.gt td:first-child{text-align:left;font-weight:500;}
.gt tr:last-child td{border-bottom:none;}
.gt tr.q{background:rgba(58,123,213,.06);}
.gt tr.q td:first-child{border-left:2px solid var(--accent2);}
.tc{display:flex;align-items:center;gap:5px;}
.pts-c{font-weight:700;color:var(--accent);}
.gd-p{color:var(--green);} .gd-n{color:var(--red);}

/* ══════════════════════════════════════════
   SCHEDULE
   ══════════════════════════════════════════ */
.sch-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:8px 12px;outline:none;flex:1;min-width:140px;}
.search-box:focus{border-color:var(--accent2);}
.grp-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none;}
.grp-scroll::-webkit-scrollbar{display:none;}
.fb{background:var(--card);border:1px solid var(--border);color:var(--gray);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.fb:hover{border-color:var(--accent2);color:var(--text);}
.fb.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

.mday{margin-bottom:16px;}
.mday-head{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:6px;}
.mrow{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;gap:6px;margin-bottom:6px;transition:border-color .15s;}
.mrow.has-score{border-color:rgba(34,197,94,.25);}
.mrow.is-live{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.04);}
.mrow-meta{grid-column:1/-1;display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.mbadge{font-size:9px;font-weight:700;color:var(--accent);background:rgba(245,197,24,.1);border-radius:3px;padding:1px 5px;}
.mlive-tag{font-size:9px;font-weight:700;color:var(--live);background:rgba(239,68,68,.15);border-radius:3px;padding:1px 5px;display:flex;align-items:center;gap:3px;}
.mlive-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite;display:inline-block;}
/* Live score detail box */
.live-detail{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:8px 10px;margin-top:4px;grid-column:1/-1;}
.live-events{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.live-event{font-size:9px;background:var(--surface);border-radius:3px;padding:2px 5px;color:var(--dim);}
.live-event.goal{color:var(--green);}
.live-event.card{color:var(--orange);}
.live-stat-row{display:grid;grid-template-columns:1fr auto 1fr;gap:4px;align-items:center;font-size:9px;margin-top:4px;}
.live-stat-bar-w{height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.live-stat-bar-h{height:3px;background:var(--accent2);border-radius:99px;float:right;}
.live-stat-bar-a{height:3px;background:var(--orange);border-radius:99px;}
.mtime{font-size:9px;color:var(--dim);margin-left:auto;}
.mteam{font-weight:600;font-size:12px;display:flex;align-items:center;gap:5px;}
.mteam.h{justify-content:flex-end;text-align:right;}
.mteam.a{justify-content:flex-start;text-align:left;}
.mflag{font-size:16px;}
.sbox{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 8px;text-align:center;}
.sbox .sv{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--green);}
.sbox .sv.live{color:var(--orange);}
.sbox .vs{font-size:11px;color:var(--dim);font-weight:700;}
.sbox .vtime{font-size:9px;color:var(--dim);margin-top:1px;}

/* ══════════════════════════════════════════
   KNOCKOUT
   ══════════════════════════════════════════ */
.bracket-wrap{overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch;}
.bracket{display:flex;gap:8px;min-width:900px;padding:4px;}
.b-round{flex:1;display:flex;flex-direction:column;min-width:160px;}
.b-round-head{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--accent);text-align:center;padding:7px;background:var(--surface);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;}
.b-round-body{flex:1;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--surface);padding:5px;display:flex;flex-direction:column;justify-content:space-around;gap:5px;}
.bm{background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.bm.has-score{border-color:rgba(34,197,94,.3);}
.bt{padding:5px 8px;font-size:10px;font-weight:500;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.bt:last-of-type{border-bottom:none;}
.bt.tbd{color:var(--dim);font-style:italic;}
.bt.winner{background:rgba(34,197,94,.08);font-weight:700;color:var(--green);}
.bscore{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent);}
.bm-info{padding:2px 8px;font-size:8px;color:var(--dim);background:rgba(0,0,0,.2);border-top:1px solid var(--border);display:flex;justify-content:space-between;}
.champ-box{text-align:center;padding:14px 8px;background:var(--card);border:2px solid var(--accent);border-radius:10px;min-width:110px;}
.champ-trophy{font-size:28px;margin-bottom:4px;}
.champ-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--accent);}
.champ-name{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;margin-top:4px;min-height:22px;}

/* ══════════════════════════════════════════
   STATS
   ══════════════════════════════════════════ */
.stats-top{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.st-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.st-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--accent);line-height:1;}
.st-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;}
.sc-title{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
.sr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(30,45,74,.5);}
.sr:last-child{border-bottom:none;}
.rn{font-size:9px;color:var(--dim);width:16px;}
.tn{flex:1;font-weight:500;font-size:11px;}
.rv{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--accent);}

/* ══════════════════════════════════════════
   API STATUS CARD
   ══════════════════════════════════════════ */
.api-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.api-card .api-icon{font-size:24px;flex-shrink:0;}
.api-card .api-info{flex:1;}
.api-card .api-title{font-size:12px;font-weight:700;margin-bottom:2px;}
.api-card .api-sub{font-size:10px;color:var(--dim);}
.api-card .api-badge{font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;flex-shrink:0;}
.api-badge.ok{background:rgba(34,197,94,.15);color:var(--green);}
.api-badge.err{background:rgba(239,68,68,.15);color:var(--red);}
.api-badge.wait{background:rgba(245,197,24,.15);color:var(--accent);}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:8px;font-weight:600;font-size:12px;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.green{border-color:var(--green);color:var(--green);}
#toast.red{border-color:var(--red);color:var(--red);}

/* ── LOADING OVERLAY ── */
#api-loading{position:fixed;top:52px;left:0;right:0;height:2px;background:transparent;z-index:400;}
#api-loading-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0%;transition:width .3s;border-radius:0 2px 2px 0;}

/* ══════════════════════════════════════════
   DESKTOP RESPONSIVE
   ══════════════════════════════════════════ */
@media(min-width:768px){
  .bottom-nav{display:none;}
  .desktop-nav{display:flex;gap:2px;flex:1;}
  main{padding:20px 20px 30px;}
  .hero-stats{grid-template-columns:repeat(4,1fr);}
  .stats-top{grid-template-columns:repeat(4,1fr);}
  nav button{background:none;border:none;color:var(--gray);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;}
  nav button:hover{color:var(--text);background:var(--card);}
  nav button.active{color:var(--accent);background:rgba(245,197,24,.1);}
  #toast{bottom:20px;}
  .mrow{grid-template-columns:1fr 80px 1fr;}
}
@media(max-width:767px){
  .desktop-nav{display:none;}
  .hero-title{font-size:36px;}
  .groups-grid{grid-template-columns:1fr;}
}

/* ══ HIGHLIGHTS TAB ══ */
.hl-player{display:none;} /* tidak dipakai, semua tap-to-youtube */
.hl-featured{position:relative;border-radius:12px;overflow:hidden;background:#000;margin-bottom:14px;cursor:pointer;display:block;text-decoration:none;}
.hl-featured img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;}
.hl-featured-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.8) 0%,transparent 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:14px;}
.hl-featured-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;background:rgba(204,0,0,.9);display:flex;align-items:center;justify-content:center;font-size:22px;padding-left:4px;transition:transform .15s;}
.hl-featured:hover .hl-featured-play{transform:translate(-50%,-50%) scale(1.1);}
.hl-featured-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;}
.hl-featured-meta{font-size:10px;color:rgba(255,255,255,.6);}
.hl-geo-banner{background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;}
.hl-geo-icon{font-size:20px;flex-shrink:0;}
.hl-geo-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.hl-geo-text{font-size:11px;color:var(--dim);line-height:1.6;}
.hl-platform-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.hl-platform-btn{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--text);text-decoration:none;transition:border-color .15s;}
.hl-platform-btn:hover{border-color:var(--accent);}
.vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.vid-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s;}
.vid-card:hover{border-color:var(--accent2);transform:translateY(-2px);}
.vid-card.active{border-color:var(--accent);border-width:2px;}
.vid-thumb{position:relative;padding-top:56.25%;background:#111;overflow:hidden;}
.vid-thumb img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
.vid-thumb .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:rgba(239,68,68,.9);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;padding-left:3px;}
.vid-info{padding:10px 12px;}
.vid-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.vid-meta{font-size:10px;color:var(--dim);}
.hl-loading{text-align:center;padding:40px;color:var(--dim);font-size:13px;}
.hl-filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none;}
.hl-filter-bar::-webkit-scrollbar{display:none;}
.hl-src-note{font-size:10px;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.hl-src-note a{color:var(--accent2);}
.hl-err{background:var(--card);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:20px;text-align:center;font-size:12px;color:var(--dim);}

/* ── TEAM MODAL ── */
.tm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0;}
@media(min-width:600px){.tm-overlay{align-items:center;}}
.tm-modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;}
@media(min-width:600px){.tm-modal{border-radius:16px;max-height:80vh;}}
.tm-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.tm-flag{font-size:40px;line-height:1;}
.tm-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;}
.tm-sub{font-size:11px;color:var(--dim);}
.tm-close{margin-left:auto;background:none;border:1px solid var(--border);color:var(--dim);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tm-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.tm-stat{background:var(--card);border-radius:8px;padding:8px;text-align:center;}
.tm-stat .v{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);line-height:1;}
.tm-stat .l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.tm-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin:12px 0 6px;}
.sq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px;}
.sq-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 8px;}
.sq-num{font-size:9px;color:var(--dim);margin-bottom:1px;}
.sq-name{font-size:11px;font-weight:600;color:var(--text);}
.sq-club{font-size:9px;color:var(--dim);}
.sq-pos{display:inline-block;font-size:8px;font-weight:700;border-radius:3px;padding:1px 4px;margin-top:2px;}
.sq-pos.GK{background:rgba(245,197,24,.15);color:var(--accent);}
.sq-pos.DF{background:rgba(34,197,94,.1);color:var(--green);}
.sq-pos.MF{background:rgba(58,123,213,.15);color:var(--accent2);}
.sq-pos.FW{background:rgba(239,68,68,.1);color:var(--red);}

async function fetchAllFixtures(){
  loadBar(20);
  setApiStatus('wait','Mengambil data…');
  try {
    // Ambil semua event liga World Cup 2026 dari TheSportsDB
    const url = `https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=${CONFIG.LEAGUE_ID}&s=2026`;
    const res = await fetch(url);
    loadBar(50);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    loadBar(80);
    processEvents(data.events || []);
    lastFetch = new Date();
    const hasLive = liveMatches.length > 0;
    setApiStatus(hasLive ? 'live' : 'ok');
    loadBar(100);
    scheduleRefresh(hasLive ? CONFIG.LIVE_REFRESH_INTERVAL : CONFIG.REFRESH_INTERVAL);

  } catch(err){
    loadBar(100);
    console.error('TheSportsDB error:', err);
    setApiStatus('err', 'Gagal: ' + err.message);
    scheduleRefresh(CONFIG.REFRESH_INTERVAL);
  }
}

function processEvents(events){
  liveMatches = [];
  const newScores = {};

  events.forEach(ev => {
    const home = normTSDB(ev.strHomeTeam || '');
    const away = normTSDB(ev.strAwayTeam || '');
    const hg = ev.intHomeScore !== null && ev.intHomeScore !== '' ? parseInt(ev.intHomeScore) : null;
    const ag = ev.intAwayScore !== null && ev.intAwayScore !== '' ? parseInt(ev.intAwayScore) : null;
    const statusRaw = (ev.strStatus || '').toLowerCase();

    // Status: 'Match Finished' | 'Not Started' | '1H' | '2H' | 'HT' | dsb
    const isDone = statusRaw.includes('finished') || statusRaw === 'ft' || statusRaw === 'aet' || statusRaw === 'pen';
    const isLive = !isDone && (statusRaw === '1h' || statusRaw === '2h' || statusRaw === 'ht' ||
                   statusRaw === 'et' || statusRaw === 'live' || statusRaw === 'in progress');
    const elapsed = ev.intMinute ? parseInt(ev.intMinute) : null;

    if(hg === null || ag === null) return;

    // Cari match di jadwal kita
    const gm = GM.find(m =>
      (m.home === home && m.away === away) ||
      (m.home === away && m.away === home)
    );

    if(gm){
      const isReversed = gm.home === away;
      newScores[gm.m] = {
        home: isReversed ? ag : hg,
        away: isReversed ? hg : ag,
        live: isLive,
        done: isDone,
        elapsed,
        status: ev.strStatus || '',
        idEvent: ev.idEvent,
      };
      if(isLive) liveMatches.push(gm.m);
    } else {
      // Mungkin knockout — simpan dengan key nama tim
      const koKey = `${home}__${away}`;
      koScores[koKey] = { home: hg, away: ag, status: ev.strStatus, elapsed };
    }
  });

  scores = { ...scores, ...newScores };
}

function scheduleRefresh(ms){
  if(refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchLiveScores, ms);
}

function getStandings(){
  const T={};
  Object.keys(GROUPS).forEach(g=>{
    T[g]={};
    GROUPS[g].forEach(t=>{ T[g][t]={team:t,pl:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  });
  GM.forEach(m=>{
    const s=scores[m.m]; if(!s) return;
    const g=m.group; const h=T[g][m.home]; const a=T[g][m.away];
    if(!h||!a) return;
    const hg=+s.home, ag=+s.away;
    h.pl++;a.pl++; h.gf+=hg;h.ga+=ag; a.gf+=ag;a.ga+=hg;
    if(hg>ag){h.w++;h.pts+=3;a.l++;}
    else if(hg<ag){a.w++;a.pts+=3;h.l++;}
    else{h.d++;a.d++;h.pts++;a.pts++;}
  });
  Object.keys(T).forEach(g=>{
    T[g]=Object.values(T[g]).sort((a,b)=>{
      if(b.pts!==a.pts)return b.pts-a.pts;
      const da=a.gf-a.ga,db=b.gf-b.ga;
      if(db!==da)return db-da;
      if(b.gf!==a.gf)return b.gf-a.gf;
      return elo(b.team)-elo(a.team);
    });
  });
  return T;
}

function topTeam(T,g,n){ return T[g]&&T[g][n]?T[g][n].team:null; }
// ── BEST 3RD PLACE RANKING (FIFA WC 2026 rules) ──
function getBest3rd(T){
  const thirds = Object.keys(T).map(g => {
    const t = T[g][2]; // posisi ke-3 tiap grup
    return t ? {...t, group:g} : null;
  }).filter(Boolean);
  // Sort: pts → GD → GF → FIFA ranking (elo)
  return thirds.sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    const da=a.gf-a.ga, db=b.gf-b.ga;
    if(db!==da) return db-da;
    if(b.gf!==a.gf) return b.gf-a.gf;
    return elo(b.team)-elo(a.team);
  }).slice(0,8);
}

  const byDate={};
  ms.forEach(m=>{ if(!byDate[m.date]) byDate[m.date]=[]; byDate[m.date].push(m); });

  const matchRows=Object.entries(byDate).map(([date,mlist])=>`

        return `

            <div class="sbox">
              ${hasSc
                ? `<div class="sv ${isLive?'live':''}">${s.home} – ${s.away}</div>
                   <div style="font-size:8px;color:${isLive?'var(--orange)':'var(--dim)'};margin-top:1px">${isLive?'🔴 LIVE':isDone?'FT':''}</div>`
                : `<div class="vs">VS</div>

            <div class="mteam a"><span class="mflag">${fl(m.away)}</span> ${m.away}</div>

// Claude API fetch FIFA highlights terbaru
async function fetchFIFAHighlightsViaClaude(){
  try {
    const today = new Date().toISOString().slice(0,10);
    const cacheKey = 'wc2026_hl_' + today;
    const cached = localStorage.getItem(cacheKey);
    if(cached){ const d=JSON.parse(cached); if(d.length){ return d; } }

    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1500,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:
          `Search YouTube for the latest FIFA World Cup 2026 official highlight videos on the channel @fifa (channel ID UCpcTrCXblq78GZrTUTLWeBw). Find as many real YouTube video IDs as possible for match highlights from FIFA World Cup 2026. Return ONLY a JSON array, no markdown, like: [{"id":"VIDEO_ID","title":"Match Title","matchday":1,"date":"Jun 12"}]. Include up to 12 videos. Only include real video IDs you find from actual search results.`
        }]
      })
    });
    if(!res.ok) throw new Error('API '+res.status);
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const arr = JSON.parse(clean);
    if(Array.isArray(arr) && arr.length){
      const valid = arr.filter(v=>v.id&&v.id.length===11);
      localStorage.setItem(cacheKey, JSON.stringify(valid));
      return valid;
    }
  } catch(e){ console.warn('Claude HL fetch:', e.message); }
  return [];
}

function timeAgo(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  if(isNaN(d)) return dateStr;
  const diff = (Date.now() - d) / 1000;
  if(diff < 3600) return Math.floor(diff/60) + ' menit lalu';
  if(diff < 86400) return Math.floor(diff/3600) + ' jam lalu';
  return Math.floor(diff/86400) + ' hari lalu';
}

function hlSetFilter(md){
  hlMdFilter = (md==='all') ? 'all' : parseInt(md);
  hlActive = null;
  const first = (hlMdFilter==='all' ? hlVideos : hlVideos.filter(v=>v.matchday==hlMdFilter))[0];
  if(first) hlActive = first.id;
  renderHighlights();
}

function hlPlay(id){
  // Buka langsung di YouTube (geoblocking workaround)
  window.open('https://www.youtube.com/watch?v='+id, '_blank', 'noopener');
}

function hlRefresh(){
  hlFetched = false;
  hlVideos = [];
  hlActive = null;
  fetchHighlights();
}

// ══════════════════════════════════════════════════════
//  AUTO-REFRESH TOP SCORER via Claude API (1x per hari)
// ══════════════════════════════════════════════════════
const TS_CACHE_KEY = 'wc2026_topscorers_v2';
const TS_CACHE_DATE_KEY = 'wc2026_topscorers_date';

async function refreshTopScorers(force=false){
  // Cek cache localStorage — skip kalau sudah update hari ini
  try {
    const cachedDate = localStorage.getItem(TS_CACHE_DATE_KEY);
    const today = new Date().toISOString().slice(0,10);
    if(!force && cachedDate === today){
      const cached = localStorage.getItem(TS_CACHE_KEY);
      if(cached){ TOP_SCORERS = JSON.parse(cached); tsLastUpdated = today; renderStats(); return; }
    }
  } catch(e){}

  // Panggil Claude API untuk ambil top scorer terbaru
  try {
    const today = new Date().toISOString().slice(0,10);
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{
          role:'user',
          content:`Search for the current top scorers at the 2026 FIFA World Cup as of ${today}. Return ONLY a JSON array (no markdown, no explanation) with the top 16 players. Each object must have exactly these fields: name (string), team (string, use full country name like "United States" not "USA"), pos (string: FW/MF/DF/GK), goals (number), assists (number), matches (number). Sort by goals descending. Example: [{"name":"Lionel Messi","team":"Argentina","pos":"FW","goals":5,"assists":2,"matches":2}]`
        }]
      })
    });
    if(!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    // Gabung semua text blocks (termasuk setelah tool_use)
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    if(!text) throw new Error('No text');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    if(Array.isArray(parsed) && parsed.length > 0){
      TOP_SCORERS = parsed;
      tsLastUpdated = today;
      tsAutoRefreshed = true;
      try {
        localStorage.setItem(TS_CACHE_KEY, JSON.stringify(parsed));
        localStorage.setItem(TS_CACHE_DATE_KEY, today);
      } catch(e){}
      renderStats();
      toast('🥇 Top scorer diperbarui!', 'green');
    }
  } catch(err){
    console.warn('Top scorer refresh gagal:', err.message);
    // Tetap tampilkan data static yang ada
  }
}

// Default squad (tim tanpa data detail)
function getSquad(team){ return SQUADS[team] || []; }

function showTeamModal(team){
  const T = getStandings();
  const grp = TEAM_GROUP[team];
  const stat = grp && T[grp] ? T[grp].find(t=>t.team===team) : null;
  const squad = getSquad(team);
  const posOrder = {GK:0,DF:1,MF:2,FW:3};
  const sorted = [...squad].sort((a,b)=>(posOrder[a.pos]||9)-(posOrder[b.pos]||9));

  const posColors = {GK:'var(--accent)',DF:'var(--green)',MF:'var(--accent2)',FW:'var(--red)'};
  const posLabel = {GK:'Kiper',DF:'Bek',MF:'Gelandang',FW:'Penyerang'};

  // Group by position
  const byPos = {};
  sorted.forEach(p=>{ if(!byPos[p.pos]) byPos[p.pos]=[]; byPos[p.pos].push(p); });

  const squadHTML = Object.entries(byPos).map(([pos,players])=>`
    <div class="tm-sec">${posLabel[pos]||pos}</div>
    <div class="sq-grid">
      ${players.map(p=>`
        <div class="sq-card">
          <div class="sq-num">#${p.n}</div>
          <div class="sq-name">${p.name}</div>
          <div class="sq-club">${p.club}</div>
          <span class="sq-pos ${pos}" style="color:${posColors[pos]};background:${posColors[pos]}22;">${pos}</span>
        </div>`).join('')}
    </div>`).join('');

  const noSquad = !squad.length ? `<div style="color:var(--dim);font-size:12px;padding:16px 0;text-align:center;">Data skuad tidak tersedia</div>` : '';

  const statHTML = stat ? `
    <div class="tm-stat-row">
      <div class="tm-stat"><div class="v">${stat.pl}</div><div class="l">Main</div></div>
      <div class="tm-stat"><div class="v">${stat.w}</div><div class="l">Menang</div></div>
      <div class="tm-stat"><div class="v">${stat.d}</div><div class="l">Seri</div></div>
      <div class="tm-stat"><div class="v">${stat.l}</div><div class="l">Kalah</div></div>
      <div class="tm-stat"><div class="v">${stat.gf}</div><div class="l">GF</div></div>
      <div class="tm-stat"><div class="v">${stat.ga}</div><div class="l">GA</div></div>
      <div class="tm-stat"><div class="v">${stat.gf-stat.ga>0?'+':''}${stat.gf-stat.ga}</div><div class="l">GD</div></div>
      <div class="tm-stat"><div class="v" style="color:var(--accent)">${stat.pts}</div><div class="l">Poin</div></div>
    </div>` : '';

  const html = `
    <div class="tm-overlay" onclick="if(event.target===this)closeTeamModal()">
      <div class="tm-modal">
        <div class="tm-header">
          <div class="tm-flag">${fl(team)}</div>
          <div>
            <div class="tm-name">${team}</div>
            <div class="tm-sub">Grup ${grp||'?'} &middot; FIFA ${Math.round(FIFA_RANK[team]||0)} pts</div>
          </div>
          <button class="tm-close" onclick="closeTeamModal()">&#10005;</button>
        </div>
        ${statHTML}
        <div class="tm-sec">Skuad WC 2026</div>
        ${noSquad}${squadHTML}
      </div>
    </div>`;

  let ov = document.getElementById('team-modal-overlay');
  if(!ov){ ov = document.createElement('div'); ov.id='team-modal-overlay'; document.body.appendChild(ov); }
  ov.innerHTML = html;
  ov.style.display='block';
  document.body.style.overflow='hidden';
}

function closeTeamModal(){
  const ov = document.getElementById('team-modal-overlay');
  if(ov){ ov.innerHTML=''; ov.style.display='none'; }
  document.body.style.overflow='';
}

function showTab(id, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  // update desktop nav
  document.querySelectorAll('.desktop-nav button').forEach(b=>b.classList.remove('active'));
  // update bottom nav
  document.querySelectorAll('.bn-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // sync the other nav
  const isMobile = btn && btn.closest('.bottom-nav');
  if(isMobile){
    document.querySelectorAll(`.desktop-nav button`).forEach(b=>{
      if(b.getAttribute('onclick') && b.getAttribute('onclick').includes("'"+id+"'")) b.classList.add('active');
    });
  } else {
    document.querySelectorAll(`.bn-btn[data-tab="${id}"]`).forEach(b=>b.classList.add('active'));
  }
  // Trigger highlights
  if(id === 'highlights'){
    if(!hlFetched){ fetchHighlights(); }
    else { renderHighlights(); }
  }
  if(id === 'prediction') renderPrediction();
}

function renderPrediction(){
  const el = document.getElementById('tab-prediction');
  if(!el) return;

  const cards = PREDICTIONS.map(p => {
    const formHtml = p.form.map(f =>
      `<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;background:${f==='W'?'rgba(34,197,94,.2)':f==='D'?'rgba(245,197,24,.2)':'rgba(239,68,68,.2)'};color:${f==='W'?'var(--green)':f==='D'?'var(--accent)':'var(--red)'};">${f}</span>`
    ).join('');

    const players = p.keyPlayers.map(kp =>
      `<div style="background:var(--surface);border-radius:6px;padding:6px 8px;display:flex;gap:6px;align-items:flex-start;">
        <span style="font-size:9px;font-weight:700;background:${kp.pos==='FW'?'rgba(239,68,68,.15)':kp.pos==='MF'?'rgba(58,123,213,.15)':kp.pos==='DF'?'rgba(34,197,94,.15)':'rgba(245,197,24,.15)'};color:${kp.pos==='FW'?'var(--red)':kp.pos==='MF'?'var(--accent2)':kp.pos==='DF'?'var(--green)':'var(--accent)'};border-radius:3px;padding:1px 4px;flex-shrink:0;margin-top:1px;">${kp.pos}</span>
        <div><div style="font-size:11px;font-weight:600;">${kp.name}</div><div style="font-size:9px;color:var(--dim);">${kp.note}</div></div>
      </div>`
    ).join('');

    const strengths = p.strengths.map(s => `<li style="margin-bottom:3px;">&#9989; ${s}</li>`).join('');
    const concerns = p.concerns.map(s => `<li style="margin-bottom:3px;">&#9888;&#65039; ${s}</li>`).join('');

    return `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;">
      <!-- Header -->
      <div style="background:linear-gradient(135deg,var(--surface),var(--card));padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;">
        <div style="font-size:48px;line-height:1;">${fl(p.team)}</div>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;">${p.team}</span>
            <span style="font-size:10px;font-weight:700;background:${p.badgeColor}22;color:${p.badgeColor};border:1px solid ${p.badgeColor}44;border-radius:4px;padding:2px 7px;">${p.badge}</span>
          </div>
          <div style="display:flex;gap:12px;margin-top:4px;flex-wrap:wrap;">
            <span style="font-size:11px;color:var(--dim);">Odds: <strong style="color:var(--accent);">${p.odds}</strong></span>
            <span style="font-size:11px;color:var(--dim);">Peluang: <strong style="color:var(--green);">${p.probability}</strong></span>
            <span style="font-size:11px;color:var(--dim);">GF/GA: <strong>${p.gf}/${p.ga}</strong></span>
            <span style="font-size:11px;color:var(--dim);">Form: ${formHtml}</span>
          </div>
          <div style="font-size:10px;color:var(--dim);margin-top:3px;">&#128101; ${p.coach}</div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);line-height:1;">#${p.rank}</div>
      </div>

      <!-- Analisis -->
      <div style="padding:14px 16px;">
        <div style="font-size:12px;color:var(--text);line-height:1.7;margin-bottom:12px;border-left:3px solid ${p.badgeColor};padding-left:10px;">${p.analysis}</div>

        <!-- Kekuatan & Risiko -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
          <div>
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:5px;">Kekuatan</div>
            <ul style="list-style:none;padding:0;font-size:11px;color:var(--text);line-height:1.6;">${strengths}</ul>
          </div>
          <div>
            <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:5px;">Risiko & Kekhawatiran</div>
            <ul style="list-style:none;padding:0;font-size:11px;color:var(--text);line-height:1.6;">${concerns}</ul>
          </div>
        </div>

        <!-- Key Players -->
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:6px;">Pemain Kunci</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:5px;margin-bottom:10px;">${players}</div>

        <!-- Route to Final -->
        <div style="background:var(--surface);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--dim);">
          &#128506; Jalur potensial: <span style="color:var(--text);">${p.route}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="sec-title">🔮 Prediksi Potensi Juara</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:14px;line-height:1.6;">
      Analisa berdasarkan: hasil grup, odds bookmaker (FanDuel/FOX Sports 25 Jun 2026),
      Opta supercomputer, kualitas skuad, form, kondisi pemain &amp; pelatih.
      <strong style="color:var(--accent);">Diperbarui setelah MD2.</strong>
    </div>
    ${cards}
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:4px;">
      <div style="font-size:10px;font-weight:700;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Tim Berbahaya Lainnya</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${[
          {t:'England',o:'+650',n:'Kane+Bellingham, Tuchel bawa struktur baru'},
          {t:'Germany',o:'+1300',n:'7 gol di MD1, Undav super-sub mematikan'},
          {t:'Netherlands',o:'+1500',n:'Gakpo-Brobbey tajam, Van Dijk kokoh'},
          {t:'Brazil',o:'+1300',n:'Cunha+Vinicius bangkit, Ancelotti effect'},
          {t:'Morocco',o:'+4000',n:'Saibari 3 gol, dark horse Afrika'},
        ].map(t=>`
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;min-width:140px;">
            <div style="font-size:13px;">${fl(t.t)} <strong style="font-size:11px;">${t.t}</strong> <span style="font-size:10px;color:var(--accent);">${t.o}</span></div>
            <div style="font-size:9px;color:var(--dim);margin-top:2px;">${t.n}</div>
          </div>`).join('')}
      </div>
    </div>
    <div style="font-size:9px;color:var(--dim);margin-top:12px;text-align:center;">
      Odds per 25 Jun 2026 via FanDuel Sportsbook. Bukan saran taruhan. Data Opta: France 13%, Spain 16%, Argentina 10.4%.
    </div>`;
}
